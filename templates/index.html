<!DOCTYPE html>
<html>

<head>

    <title>Expense Tracker</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>Expense Tracker</h1>

    <form action="/add" method="POST">

        <input
            type="text"
            name="title"
            placeholder="Expense Title"
            required>

        <input
            type="number"
            step="0.01"
            name="amount"
            placeholder="Amount"
            required>

        <select name="category">

            <option>Food</option>
            <option>Travel</option>
            <option>Shopping</option>
            <option>Bills</option>
            <option>Other</option>

        </select>

        <button type="submit">
            Add Expense
        </button>

    </form>

    <h2>Total Expense: ₹{{ total }}</h2>

    <table>

        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Amount</th>
            <th>Category</th>
            <th>Date</th>
            <th>Delete</th>
        </tr>

        {% for e in expenses %}

        <tr>

            <td>{{ e.ExpenseID }}</td>
            <td>{{ e.Title }}</td>
            <td>{{ e.Amount }}</td>
            <td>{{ e.Category }}</td>
            <td>{{ e.ExpenseDate }}</td>

            <td>
                <a href="/delete/{{ e.ExpenseID }}">
                    Delete
                </a>
            </td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>

</html>
